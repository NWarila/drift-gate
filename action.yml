name: Drift Gate
description: >
  Detects when files in a consumer repo have drifted from a canonical source.
  Reports per-file annotations via the GitHub Check Runs API; fails the step
  if any file differs from its canonical copy.
author: NWarila
branding:
  icon: shield
  color: blue

inputs:
  source-repo:
    description: 'Canonical source to compare against, in "owner/repo" form.'
    required: true
  source-ref:
    description: >
      Git ref (SHA, branch, or tag) of source-repo to compare against. SHA pins
      are strongly recommended for reproducibility.
    required: true
  manifest:
    description: >
      Path within source-repo to the drift manifest (JSON). Defaults to
      "drift-manifest.json" at the source repo root.
    required: false
    default: drift-manifest.json
  consumer-ref:
    description: >
      Git ref of the consumer to check. Defaults to the PR head SHA when running
      on pull_request events; otherwise github.sha.
    required: false
    default: ""
  check-name:
    description: 'Name displayed for the GitHub Check Run.'
    required: false
    default: 'drift-gate / verify'
  github-token:
    description: 'Token used to POST Check Runs to the consumer repo. Defaults to GITHUB_TOKEN.'
    required: false
    default: ${{ github.token }}
  python-version:
    description: 'Python version used to run the check.'
    required: false
    default: '3.12'

outputs:
  passed:
    description: '"true" if every manifest file is byte-identical with source; "false" otherwise.'
    value: ${{ steps.run.outputs.passed }}

runs:
  using: composite
  steps:
    - name: Resolve consumer-ref default
      id: refs
      shell: bash
      env:
        OVERRIDE: ${{ inputs.consumer-ref }}
        PR_HEAD: ${{ github.event.pull_request.head.sha }}
        FALLBACK_SHA: ${{ github.sha }}
      run: |
        set -euo pipefail
        if [ -n "${OVERRIDE}" ]; then
          ref="${OVERRIDE}"
        elif [ -n "${PR_HEAD}" ]; then
          ref="${PR_HEAD}"
        else
          ref="${FALLBACK_SHA}"
        fi
        echo "consumer-ref=${ref}" >> "${GITHUB_OUTPUT}"

    - name: Check out consumer
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        path: .drift-gate-consumer
        fetch-depth: 1
        ref: ${{ steps.refs.outputs.consumer-ref }}
        persist-credentials: false

    - name: Check out source repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        repository: ${{ inputs.source-repo }}
        ref: ${{ inputs.source-ref }}
        path: .drift-gate-source
        fetch-depth: 1
        persist-credentials: false

    - name: Setup Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v6.0.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install drift-gate package
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: python -m pip install --no-cache-dir "${ACTION_PATH}"

    - name: Run drift check
      id: run
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        HEAD_SHA: ${{ steps.refs.outputs.consumer-ref }}
        MANIFEST: ${{ inputs.manifest }}
        CHECK_NAME: ${{ inputs.check-name }}
        SOURCE_REPO: ${{ inputs.source-repo }}
        SOURCE_REF: ${{ inputs.source-ref }}
        # The drift-gate action's own SHA, for the rendered footer. Falls back
        # to the action_ref if the action wasn't checked out by SHA.
        GATE_VERSION: ${{ github.action_ref }}
      run: |
        set -euo pipefail
        if python -m baseline.cli \
            --consumer-root .drift-gate-consumer \
            --source-root .drift-gate-source \
            --manifest ".drift-gate-source/${MANIFEST}" \
            --output-mode check-run \
            --head-sha "${HEAD_SHA}" \
            --repo "${REPO}" \
            --source-repo "${SOURCE_REPO}" \
            --source-ref "${SOURCE_REF}" \
            --gate-version "${GATE_VERSION}" \
            --check-name "${CHECK_NAME}" \
            --step-summary "${GITHUB_STEP_SUMMARY:-/dev/null}"; then
          echo "passed=true" >> "${GITHUB_OUTPUT}"
        else
          echo "passed=false" >> "${GITHUB_OUTPUT}"
          exit 1
        fi
