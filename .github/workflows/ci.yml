name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install drift-gate + dev deps
        run: python -m pip install --no-cache-dir '.[dev]'

      - name: Run pytest
        run: python -m pytest tests/ -v

  ruff:
    name: ruff
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install ruff
        # renovate: datasource=pypi depName=ruff
        run: python -m pip install --no-cache-dir ruff==0.13.0

      - name: Lint
        run: ruff check tools/ tests/

      - name: Format check
        run: ruff format --check tools/ tests/

  smoke-test-action:
    name: smoke-test (action against fixtures)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install drift-gate package
        run: python -m pip install --no-cache-dir .

      - name: Smoke-test against good fixture (must pass)
        run: |
          python -m baseline.cli \
            --consumer-root tests/fixtures/good-consumer \
            --source-root tests/fixtures/source \
            --manifest tests/fixtures/source/baseline-manifest.json \
            --output-mode markdown

      - name: Smoke-test against bad fixture (must fail)
        run: |
          set +e
          python -m baseline.cli \
            --consumer-root tests/fixtures/bad-consumer \
            --source-root tests/fixtures/source \
            --manifest tests/fixtures/source/baseline-manifest.json \
            --output-mode markdown
          rc=$?
          if [ "$rc" -eq 0 ]; then
            echo "::error::bad fixture should have failed but exited 0"
            exit 1
          fi
          echo "bad fixture failed with rc=$rc as expected"
